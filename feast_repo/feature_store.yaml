# Feast project config (local dev: file offline + Redis online)
# Apply from repo root:  feast -c feast_repo apply
#
# Redis URL: use 127.0.0.1 when running scripts on the host with published port 6379.
# Inside Docker, re-apply with redis://redis:6379/0 if you materialize from a container.

project: modelserve
registry: data/registry.db
provider: local
entity_key_serialization_version: 2

online_store:
  type: redis
  connection_string: "redis://127.0.0.1:6379/0"

offline_store:
  type: file
