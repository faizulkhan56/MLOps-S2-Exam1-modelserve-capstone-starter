# ============================================================================
# Grafana — Dashboard Provisioning
# ============================================================================
# TODO: Configure Grafana to auto-load dashboards from a directory.
#
# This file tells Grafana where to find dashboard JSON files.
# Dashboards should load automatically on startup without manual import.
#
# You need to define:
#   - apiVersion: 1
#   - providers list with:
#     - name, type (file), options.path pointing to the dashboards directory
#     - updateIntervalSeconds for how often to scan for changes
#     - allowUiUpdates: true (so you can edit in the UI during development)
#
# The path must match where you mount dashboards in docker-compose.yml
# (typically /var/lib/grafana/dashboards)
#
# Refer to Grafana provisioning docs:
# https://grafana.com/docs/grafana/latest/administration/provisioning/
# ============================================================================
