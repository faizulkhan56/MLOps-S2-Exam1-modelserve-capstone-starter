# ============================================================================
# Grafana — Datasource Provisioning
# ============================================================================
# TODO: Configure Prometheus as a Grafana datasource.
#
# This file auto-configures the datasource on Grafana startup.
# No manual UI configuration should be needed.
#
# You need to define:
#   - apiVersion: 1
#   - datasources list with:
#     - name, type (prometheus), access (proxy)
#     - url pointing to your Prometheus instance
#     - isDefault: true
#
# The URL must use the Docker Compose service name (e.g., http://prometheus:9090)
#
# Refer to Grafana provisioning docs:
# https://grafana.com/docs/grafana/latest/administration/provisioning/
# ============================================================================
