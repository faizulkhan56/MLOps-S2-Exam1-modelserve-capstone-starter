# ModelServe — Prometheus Alert Rules
# ============================================================================
# TODO: Define at least THREE alert rules.
#
# Required alerts:
#   1. High prediction latency
#      - Trigger when p95 latency exceeds your chosen threshold for 5 minutes
#      - Hint: histogram_quantile(0.95, rate(prediction_duration_seconds_bucket[5m]))
#      - Severity: warning
#
#   2. Elevated error rate
#      - Trigger when error rate exceeds 5% for 2 minutes
#      - Hint: rate(prediction_errors_total[2m]) / rate(prediction_requests_total[2m])
#      - Severity: warning
#
#   3. Service down
#      - Trigger when the FastAPI service is unreachable for 1 minute
#      - Hint: up{job="your-job-name"} == 0
#      - Severity: critical
#
# Each alert needs:
#   - alert: <name>
#   - expr: <PromQL expression>
#   - for: <duration>
#   - labels: severity
#   - annotations: summary and description
#
# The TA will verify these alerts exist and may trigger them during the demo.
# ============================================================================
