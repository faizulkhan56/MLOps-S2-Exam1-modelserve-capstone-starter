# Prometheus — ModelServe (Phase 7)
# API metrics: 10s; node-exporter: 15s (per-job scrape_interval overrides global).

global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Paths are relative to this file's directory (/etc/prometheus/ in Docker).
rule_files:
  - alerts.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: modelserve-api
    metrics_path: /metrics
    scrape_interval: 10s
    static_configs:
      - targets: ["api:8000"]
        labels:
          service: "modelserve-api"

  - job_name: node-exporter
    scrape_interval: 15s
    static_configs:
      - targets: ["node-exporter:9100"]
        labels:
          service: "node-exporter"
