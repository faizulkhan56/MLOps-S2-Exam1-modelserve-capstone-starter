# ModelServe — local development stack (Phases 1–2)
# Prerequisites: copy .env.example to .env
#   cp .env.example .env
# Start everything:
#   docker compose up -d
# Base services only (operations doc 2.4):
#   docker compose up -d postgres redis mlflow

name: modelserve

networks:
  modelserve:
    driver: bridge

volumes:
  pgdata: {}
  mlflow_artifacts: {}
  prometheus_data: {}
  grafana_data: {}

services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mlflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mlflow}
      POSTGRES_DB: ${POSTGRES_DB:-mlflow}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mlflow} -d ${POSTGRES_DB:-mlflow}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [modelserve]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [modelserve]

  # Custom build: base image lacks psycopg2 required for --backend-store-uri postgresql://...
  mlflow:
    build:
      context: .
      dockerfile: docker/mlflow/Dockerfile
    image: modelserve-mlflow:local
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      MLFLOW_S3_IGNORE_TLS: "true"
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri postgresql://${POSTGRES_USER:-mlflow}:${POSTGRES_PASSWORD:-mlflow}@postgres:5432/${POSTGRES_DB:-mlflow}
      --default-artifact-root /mlflow/artifacts
    ports:
      - "5000:5000"
    volumes:
      - mlflow_artifacts:/mlflow/artifacts
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/')",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks: [modelserve]

  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: modelserve-api:local
    restart: unless-stopped
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      FEAST_REPO_PATH: /app/feast_repo
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      mlflow:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [modelserve]

  prometheus:
    image: prom/prometheus:v2.48.0
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.console.libraries=/usr/share/prometheus/console_libraries
      - --web.console.templates=/usr/share/prometheus/consoles
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    depends_on: [api]
    networks: [modelserve]

  grafana:
    image: grafana/grafana:10.2.2
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      # Default 3001 on host: 3000 is often taken (other tools). Override with GRAFANA_PORT in .env
      GF_SERVER_ROOT_URL: "http://localhost:${GRAFANA_PORT:-3001}"
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on: [prometheus]
    networks: [modelserve]

  # Default collector only (works on Docker Desktop Windows/Mac and Linux).
  # For full host metrics on Linux, add proc/sys mounts in a later phase if needed.
  node-exporter:
    image: prom/node-exporter:v1.7.0
    restart: unless-stopped
    ports:
      - "9100:9100"
    networks: [modelserve]
